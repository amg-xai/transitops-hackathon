<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TransitOps</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    body { background: #f0f2f5; transition: background-color .15s ease, color .15s ease; }
    html[data-bs-theme="dark"] body { background: #0f1220; color: #e2e2e2; }

    .sidebar { min-height: 100vh; background: #1a1f36; width: 240px; position: fixed; top:0; left:0; padding-top: 20px; z-index:100; }
    .sidebar .brand { color: #fff; font-size: 1.4rem; font-weight: 700; padding: 10px 20px 20px; border-bottom: 1px solid #2d3561; }
    .sidebar .nav-link { color: #a0aec0; padding: 10px 20px; display: flex; align-items: center; gap: 10px; }
    .sidebar .nav-link:hover, .sidebar .nav-link.active { color: #fff; background: #2d3561; border-radius: 6px; margin: 0 8px; }
    .main-content { margin-left: 240px; padding: 30px; }
    .kpi-card { border-radius: 12px; border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .table-card { border-radius: 12px; border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .status-available { color: #28a745; font-weight: 600; }
    .status-on_trip   { color: #007bff; font-weight: 600; }
    .status-in_shop   { color: #ffc107; font-weight: 600; }
    .status-retired   { color: #6c757d; font-weight: 600; }
    .status-suspended { color: #dc3545; font-weight: 600; }

    html[data-bs-theme="dark"] .status-in_shop { color: #ffd54f; }

    .theme-toggle-btn {
      width: 100%; background: transparent; border: 1px solid #2d3561; color: #a0aec0;
      padding: 8px 12px; border-radius: 6px; font-size: 0.85rem; display: flex;
      align-items: center; gap: 8px; margin-bottom: 8px; transition: all .15s ease;
    }
    .theme-toggle-btn:hover { background: #2d3561; color: #fff; }
  </style>
  <script>
    // Apply saved theme before paint, to avoid a light-mode flash on load
    (function() {
      const saved = localStorage.getItem('transitops-theme');
      if (saved) document.documentElement.setAttribute('data-bs-theme', saved);
    })();
  </script>
</head>
<body>
  <div class="sidebar">
    <div class="brand"><i class="bi bi-truck"></i> TransitOps</div>
    <nav class="nav flex-column mt-3">
      <a class="nav-link" href="/"><i class="bi bi-speedometer2"></i> Dashboard</a>
      <a class="nav-link" href="/vehicles/"><i class="bi bi-truck-front"></i> Vehicles</a>
      <a class="nav-link" href="/drivers/"><i class="bi bi-person-badge"></i> Drivers</a>
      <a class="nav-link" href="/trips/"><i class="bi bi-map"></i> Trips</a>
      <a class="nav-link" href="/maintenance/"><i class="bi bi-tools"></i> Maintenance</a>
      <a class="nav-link" href="/fueling/"><i class="bi bi-fuel-pump"></i> Fueling</a>
      {% if can_view_reports %}<a class="nav-link" href="{% url 'reports' %}"><i class="bi bi-bar-chart"></i> Reports</a>{% endif %}
    </nav>
    <div style="position:absolute; bottom:20px; width:100%; padding: 0 20px;">
      <button type="button" id="theme-toggle" class="theme-toggle-btn">
        <i class="bi bi-moon-stars" id="theme-icon"></i> <span id="theme-label">Dark Mode</span>
      </button>
      <a href="/accounts/logout/" class="nav-link text-danger"><i class="bi bi-box-arrow-left"></i> Logout</a>
    </div>
  </div>

  <div class="main-content">
    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const html = document.documentElement;
    const toggleBtn = document.getElementById('theme-toggle');
    const icon = document.getElementById('theme-icon');
    const label = document.getElementById('theme-label');

    function syncButton() {
      const isDark = html.getAttribute('data-bs-theme') === 'dark';
      icon.className = isDark ? 'bi bi-sun' : 'bi bi-moon-stars';
      label.textContent = isDark ? 'Light Mode' : 'Dark Mode';
    }
    syncButton();

    toggleBtn.addEventListener('click', () => {
      const next = html.getAttribute('data-bs-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-bs-theme', next);
      localStorage.setItem('transitops-theme', next);
      syncButton();
    });
  </script>
</body>
</html>
