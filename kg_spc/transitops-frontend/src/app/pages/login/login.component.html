<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <div class="logo">
        <i class="pi pi-truck"></i>
        <span>TransitOps</span>
      </div>
      <h2>Welcome Back</h2>
      <p>Sign in to your account</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="username">Username</label>
        <input
          id="username"
          type="text"
          pInputText
          formControlName="username"
          placeholder="Enter your username"
          [class.p-invalid]="loginForm.get('username')?.invalid && loginForm.get('username')?.touched"
        />
        <small class="p-error" *ngIf="loginForm.get('username')?.invalid && loginForm.get('username')?.touched">
          Username is required
        </small>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          pPassword
          formControlName="password"
          placeholder="Enter your password"
          [class.p-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
        />
        <small class="p-error" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
          Password is required
        </small>
      </div>

      <p-button
        type="submit"
        label="Sign In"
        [loading]="loading"
        styleClass="w-full"
      ></p-button>
    </form>

    <div class="login-footer">
      <p>Don't have an account? <a routerLink="/register">Register</a></p>
    </div>
  </div>

  <p-toast></p-toast>
</div>
