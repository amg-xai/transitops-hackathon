{% extends 'base.html' %}
{% block content %}
<div class="card table-card p-4" style="max-width:500px">
  <h4 class="fw-bold mb-4">Add Expense</h4>
  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label">Vehicle</label>
      <select name="vehicle" class="form-select" required>
        {% for v in vehicles %}<option value="{{ v.pk }}">{{ v.registration_number }} — {{ v.name }}</option>{% endfor %}
      </select>
    </div>
    <div class="mb-3">
      <label class="form-label">Category</label>
      <select name="category" class="form-select">
        <option value="fuel">Fuel</option>
        <option value="toll">Toll</option>
        <option value="maintenance">Maintenance</option>
        <option value="other">Other</option>
      </select>
    </div>
    <div class="mb-3">
      <label class="form-label">Amount (₹)</label>
      <input type="number" name="amount" class="form-control" step="0.01" required/>
    </div>
    <div class="mb-3">
      <label class="form-label">Description</label>
      <input type="text" name="description" class="form-control"/>
    </div>
    <div class="mb-3">
      <label class="form-label">Date</label>
      <input type="date" name="date" class="form-control" required/>
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary">Save</button>
      <a href="{% url 'fuel_list' %}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
