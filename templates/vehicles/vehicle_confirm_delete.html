{% extends 'base.html' %}
{% block content %}
<div class="card table-card p-4" style="max-width:500px">
  <h4 class="fw-bold mb-3">Delete Vehicle</h4>
  <p>Are you sure you want to delete <strong>{{ vehicle.registration_number }} — {{ vehicle.name }}</strong>?</p>
  <form method="post">
    {% csrf_token %}
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-danger">Yes, Delete</button>
      <a href="{% url 'vehicle_list' %}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
