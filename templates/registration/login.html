<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Login — TransitOps</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body { background: #1a1f36; display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .login-card { width: 400px; border-radius: 16px; border: none; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
  </style>
</head>
<body>
  <div class="card login-card p-4">
    <h2 class="text-center mb-1 fw-bold">🚛 TransitOps</h2>
    <p class="text-center text-muted mb-4">Smart Transport Operations</p>
    {% if form.errors %}
      <div class="alert alert-danger">Invalid username or password.</div>
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-semibold">Username</label>
        <input type="text" name="username" class="form-control" required autofocus/>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Password</label>
        <input type="password" name="password" class="form-control" required/>
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">Login</button>
    </form>
  </div>
</body>
</html>
