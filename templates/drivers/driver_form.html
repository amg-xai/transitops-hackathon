{% extends 'base.html' %}
{% block content %}
<div class="card table-card p-4" style="max-width:600px">
  <h4 class="fw-bold mb-4">{{ action }} Driver</h4>
  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label">Full Name</label>
      <input type="text" name="name" class="form-control" value="{{ driver.name }}" required/>
    </div>
    <div class="mb-3">
      <label class="form-label">License Number</label>
      <input type="text" name="license_number" class="form-control" value="{{ driver.license_number }}" required/>
    </div>
    <div class="mb-3">
      <label class="form-label">License Category</label>
      <input type="text" name="license_category" class="form-control" value="{{ driver.license_category }}" required/>
    </div>
    <div class="mb-3">
      <label class="form-label">License Expiry Date</label>
      <input type="date" name="license_expiry" class="form-control" value="{{ driver.license_expiry }}" required/>
    </div>
    <div class="mb-3">
      <label class="form-label">Contact Number</label>
      <input type="text" name="contact_number" class="form-control" value="{{ driver.contact_number }}" required/>
    </div>
    <div class="mb-3">
      <label class="form-label">Safety Score</label>
      <input type="number" name="safety_score" class="form-control" value="{{ driver.safety_score|default:10 }}" step="0.1" min="0" max="10"/>
    </div>
    {% if action == 'Edit' %}
    <div class="mb-3">
      <label class="form-label">Status</label>
      <select name="status" class="form-select">
        <option value="available" {% if driver.status == 'available' %}selected{% endif %}>Available</option>
        <option value="on_trip"   {% if driver.status == 'on_trip'   %}selected{% endif %}>On Trip</option>
        <option value="off_duty"  {% if driver.status == 'off_duty'  %}selected{% endif %}>Off Duty</option>
        <option value="suspended" {% if driver.status == 'suspended' %}selected{% endif %}>Suspended</option>
      </select>
    </div>
    {% endif %}
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary">Save</button>
      <a href="{% url 'driver_list' %}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
