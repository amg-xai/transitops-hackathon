{% extends 'base.html' %}
{% block content %}
<div class="card table-card p-4" style="max-width:600px">
  <h4 class="fw-bold mb-4">Add Maintenance Record</h4>
  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label">Vehicle</label>
      <select name="vehicle" class="form-select" required>
        {% for v in vehicles %}
          <option value="{{ v.pk }}">{{ v.registration_number }} — {{ v.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="mb-3">
      <label class="form-label">Description</label>
      <textarea name="description" class="form-control" rows="3" required></textarea>
    </div>
    <div class="mb-3">
      <label class="form-label">Cost (₹)</label>
      <input type="number" name="cost" class="form-control" step="0.01" value="0"/>
    </div>
    <div class="mb-3">
      <label class="form-label">Start Date</label>
      <input type="date" name="start_date" class="form-control" required/>
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary">Save</button>
      <a href="{% url 'maintenance_list' %}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
