{% extends 'base.html' %}
{% block content %}
<div class="card table-card p-4" style="max-width:500px">
  <h4 class="fw-bold mb-4">Upload Document — {{ vehicle.registration_number }}</h4>
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label">Document Type</label>
      <select name="document_type" class="form-select">
        <option value="rc">Registration Certificate</option>
        <option value="insurance">Insurance</option>
        <option value="permit">Permit</option>
        <option value="puc">Pollution Certificate (PUC)</option>
        <option value="other">Other</option>
      </select>
    </div>
    <div class="mb-3">
      <label class="form-label">File</label>
      <input type="file" name="file" class="form-control" required/>
    </div>
    <div class="mb-3">
      <label class="form-label">Expiry Date (optional)</label>
      <input type="date" name="expiry_date" class="form-control"/>
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary">Upload</button>
      <a href="{% url 'vehicle_documents' vehicle.pk %}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
